<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Cooper" />
<title>Cooper — Light's Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #0c0c0c;
    --s1:       #161616;
    --s2:       #1f1f1f;
    --s3:       #282828;
    --border:   rgba(255,255,255,0.07);
    --border2:  rgba(255,255,255,0.13);
    --text:     #f0f0f0;
    --muted:    rgba(240,240,240,0.45);
    --hint:     rgba(240,240,240,0.22);
    --r:        10px;
    --r2:       14px;
    --green:    #4ade80; --green-bg: rgba(74,222,128,0.12);
    --blue:     #60a5fa; --blue-bg:  rgba(96,165,250,0.12);
    --amber:    #fbbf24; --amber-bg: rgba(251,191,36,0.12);
    --red:      #f87171; --red-bg:   rgba(248,113,113,0.12);
    --yellow:   #facc15; --yellow-bg:rgba(250,204,21,0.1);
  }
  html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; min-height: 100vh; }
  #app { max-width: 430px; margin: 0 auto; padding: 0 16px 80px; }

  button { font-family: inherit; cursor: pointer; border: none; outline: none; background: var(--s2); color: var(--text); border-radius: var(--r); transition: opacity .15s, transform .1s; -webkit-tap-highlight-color: transparent; }
  button:active { transform: scale(0.97); opacity: 0.85; }
  input { font-family: inherit; background: var(--s2); color: var(--text); border: 0.5px solid var(--border2); border-radius: var(--r); padding: 10px 14px; font-size: 15px; width: 100%; outline: none; }
  input::placeholder { color: var(--hint); }
  input:focus { border-color: rgba(255,255,255,0.3); }

  .screen { display: none; padding-top: 56px; }
  .screen.active { display: block; }

  /* Top bar */
  .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(12,12,12,0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 10px; padding: 12px 16px; max-width: 430px; margin: 0 auto; }
  .topbar-title { font-size: 17px; font-weight: 600; flex: 1; }
  .topbar-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .back-btn { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--s2); border: 0.5px solid var(--border2); font-size: 18px; flex-shrink: 0; }

  /* Home */
  .home-header { padding: 24px 0 20px; }
  .home-date { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .home-greeting { font-size: 22px; font-weight: 700; }
  .sleep-block { margin-bottom: 24px; }
  .label { font-size: 12px; color: var(--muted); margin-bottom: 7px; display: block; font-weight: 500; letter-spacing: 0.02em; text-transform: uppercase; }
  .sleep-warn { font-size: 12px; color: var(--amber); margin-top: 6px; }
  .section-title { font-size: 12px; color: var(--muted); font-weight: 500; letter-spacing: 0.02em; text-transform: uppercase; margin-bottom: 10px; }
  .day-list { display: flex; flex-direction: column; gap: 6px; }
  .day-btn { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: var(--s1); border: 0.5px solid var(--border); border-radius: var(--r2); width: 100%; text-align: left; }
  .day-btn:active { background: var(--s2); }
  .day-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: var(--s3); border-radius: 9px; font-size: 16px; flex-shrink: 0; }
  .day-info { flex: 1; min-width: 0; }
  .day-name { font-size: 15px; font-weight: 600; }
  .day-muscles { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chevron { color: var(--hint); font-size: 14px; flex-shrink: 0; }

  /* Sleep banner */
  .sleep-banner { background: var(--s1); border-radius: var(--r); padding: 10px 14px; margin-bottom: 12px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .sleep-banner .val { font-weight: 600; }

  /* Exercise cards */
  .ex-list { display: flex; flex-direction: column; gap: 8px; }
  .ex-card { background: var(--s1); border: 0.5px solid var(--border); border-radius: var(--r2); overflow: hidden; }
  .ex-head { padding: 13px 14px; cursor: pointer; display: flex; align-items: flex-start; gap: 10px; -webkit-tap-highlight-color: transparent; }
  .ex-head-info { flex: 1; min-width: 0; }
  .ex-name-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
  .ex-name { font-size: 14px; font-weight: 600; line-height: 1.3; word-break: break-word; }
  .badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 6px; font-size: 10px; font-weight: 700; letter-spacing: 0.04em; flex-shrink: 0; }
  .badge-hard  { background: var(--red-bg);    color: var(--red); }
  .badge-pump  { background: var(--blue-bg);   color: var(--blue); }
  .badge-maint { background: var(--yellow-bg); color: var(--yellow); }
  .badge-done  { background: var(--green-bg);  color: var(--green); }
  .ex-meta { font-size: 12px; color: var(--muted); }
  .ex-last { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.4; }
  .ex-last .hint-inline { font-weight: 600; }
  .ex-last .hint-green  { color: var(--green); }
  .ex-last .hint-blue   { color: var(--blue); }
  .ex-last .hint-amber  { color: var(--amber); }
  .ex-last .hint-red    { color: var(--red); }
  .prog-bar-wrap { margin-top: 6px; height: 2px; background: var(--border2); border-radius: 4px; overflow: hidden; }
  .prog-bar { height: 100%; border-radius: 4px; transition: width .3s; }
  .ex-chev { color: var(--muted); font-size: 13px; margin-top: 2px; flex-shrink: 0; }

  /* Expanded body */
  .ex-body { border-top: 0.5px solid var(--border); padding: 14px; }
  .hint-box { border-radius: var(--r); padding: 10px 13px; font-size: 13px; margin-bottom: 14px; line-height: 1.4; }
  .hint-box strong { font-weight: 700; }
  .hint-green-box { background: var(--green-bg); color: var(--green); }
  .hint-blue-box  { background: var(--blue-bg);  color: var(--blue); }
  .hint-amber-box { background: var(--amber-bg); color: var(--amber); }
  .hint-red-box   { background: var(--red-bg);   color: var(--red); }

  /* Sets table */
  .sets-table { margin-bottom: 14px; }
  .sets-thead { display: grid; grid-template-columns: 24px 1fr 1fr 1fr; gap: 4px; margin-bottom: 6px; }
  .sets-thead span { font-size: 11px; color: var(--hint); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .set-row { display: grid; grid-template-columns: 24px 1fr 1fr 1fr; gap: 4px; padding: 7px 0; border-top: 0.5px solid var(--border); }
  .set-num { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .set-val { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; }

  /* Form */
  .set-label-row { font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 8px; }
  .set-num-label { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
  .stepper { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .stepper-btn { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: var(--s2); border: 0.5px solid var(--border2); border-radius: var(--r); font-size: 20px; font-weight: 300; flex-shrink: 0; }
  .stepper-val { flex: 1; text-align: center; font-size: 22px; font-weight: 700; padding: 10px 0; background: var(--s2); border-radius: var(--r); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .rpe-grid { display: flex; gap: 5px; margin-bottom: 14px; }
  .rpe-btn { flex: 1; padding: 10px 0; border-radius: var(--r); background: var(--s2); color: var(--muted); border: 0.5px solid var(--border); font-size: 13px; font-weight: 600; text-align: center; line-height: 1.3; }
  .rpe-btn span { display: block; font-size: 9px; font-weight: 500; opacity: 0.7; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
  .rpe-green  { background: var(--green-bg);  color: var(--green);  border-color: transparent; }
  .rpe-blue   { background: var(--blue-bg);   color: var(--blue);   border-color: transparent; }
  .rpe-amber  { background: var(--amber-bg);  color: var(--amber);  border-color: transparent; }
  .rpe-red    { background: var(--red-bg);    color: var(--red);    border-color: transparent; }
  .log-btn { width: 100%; padding: 13px; border-radius: var(--r); background: var(--text); color: #000; font-size: 15px; font-weight: 700; transition: opacity .15s; }
  .log-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .done-msg { text-align: center; font-size: 13px; color: var(--green); padding: 4px 0; }

  /* End session */
  .end-btn-wrap { padding-top: 16px; }
  .end-btn { width: 100%; padding: 15px; background: var(--text); color: #000; font-size: 16px; font-weight: 700; border-radius: var(--r2); }

  /* Summary */
  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 24px; }
  .stat-card { background: var(--s1); border: 0.5px solid var(--border); border-radius: var(--r2); padding: 14px; }
  .stat-label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  .stat-val { font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.03em; }
  .stat-unit { font-size: 14px; font-weight: 400; }
  .next-card { background: var(--s1); border: 0.5px solid var(--border); border-radius: var(--r2); padding: 13px 14px; margin-bottom: 8px; }
  .next-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .next-detail { font-size: 12px; color: var(--muted); margin-bottom: 3px; }
  .next-hint { font-size: 12px; font-weight: 600; }
  .btn-row { display: flex; gap: 8px; margin-top: 16px; }
  .btn-row button { flex: 1; padding: 13px; border-radius: var(--r); background: var(--s2); color: var(--text); font-size: 14px; font-weight: 600; border: 0.5px solid var(--border2); }
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="topbar" style="position:relative;backdrop-filter:none;background:transparent;border:none;padding:0;">
    </div>
    <div class="home-header">
      <div class="home-date" id="home-date"></div>
      <div class="home-greeting">Hey Light 👋</div>
    </div>
    <div class="sleep-block">
      <label class="label" for="sleep-input">Sleep last night</label>
      <input type="number" id="sleep-input" min="1" max="12" step="0.5" placeholder="hrs — e.g. 7.5" />
      <div class="sleep-warn" id="sleep-warn" style="display:none;">Under 7h — keep volume moderate today</div>
    </div>
    <div class="section-title">Select workout day</div>
    <div class="day-list" id="day-list"></div>
  </div>

  <!-- SESSION -->
  <div id="screen-session" class="screen">
    <div class="topbar" id="session-topbar">
      <button class="back-btn" onclick="goHome()">‹</button>
      <div style="flex:1;min-width:0;">
        <div class="topbar-title" id="session-day-title"></div>
        <div class="topbar-sub" id="session-day-sub"></div>
      </div>
      <div id="session-badge" style="display:none;font-size:12px;font-weight:700;padding:4px 10px;background:var(--blue-bg);color:var(--blue);border-radius:20px;"></div>
    </div>
    <div id="sleep-banner" style="display:none;" class="sleep-banner">
      <span>🌙</span>
      <span style="color:var(--muted);">Sleep:</span>
      <span class="val" id="banner-sleep-val"></span>
      <span id="banner-sleep-msg" style="font-size:12px;"></span>
    </div>
    <div id="loading-msg" style="display:none;text-align:center;color:var(--muted);font-size:13px;padding:20px 0;">Loading last session...</div>
    <div class="ex-list" id="ex-list"></div>
    <div class="end-btn-wrap" id="end-btn-wrap" style="display:none;">
      <button class="end-btn" onclick="goSummary()">End session — view summary</button>
    </div>
  </div>

  <!-- SUMMARY -->
  <div id="screen-summary" class="screen">
    <div class="topbar" id="summary-topbar">
      <button class="back-btn" onclick="showScreen('session')">‹</button>
      <div>
        <div class="topbar-title">Session complete</div>
        <div class="topbar-sub" id="summary-sub"></div>
      </div>
    </div>
    <div class="stats-grid" id="stats-grid"></div>
    <div class="section-title">Next session targets</div>
    <div id="next-cards"></div>
    <div class="btn-row">
      <button onclick="showScreen('session')">Back</button>
      <button onclick="newSession()">New session</button>
    </div>
  </div>

</div>

<script>
const DAYS = [
  { id:"Push",      icon:"💪", muscles:"Upper Chest · Triceps" },
  { id:"Pull",      icon:"🔙", muscles:"Back thickness · Biceps · Core" },
  { id:"Legs",      icon:"🦵", muscles:"Lower body · Core" },
  { id:"Aesthetic", icon:"✨", muscles:"Isolation · Arms · Abs" },
  { id:"Pump",      icon:"🔥", muscles:"Metabolic · 2nd leg hit" },
  { id:"Cardio",    icon:"🚴", muscles:"Bike / Row — 20–30 min" },
];

const EX = {
  Push:[
    {name:"Incline Chest Press",             type:"Hard", rr:[6,10],  ts:4},
    {name:"Incline DB Chest Press",           type:"Hard", rr:[10,12], ts:3},
    {name:"Flat Barbell Chest Press",         type:"Hard", rr:[8,12],  ts:3},
    {name:"Pec Deck",                         type:"Pump", rr:[12,15], ts:3},
    {name:"High-to-Low Cable Fly",            type:"Pump", rr:[12,15], ts:3},
    {name:"Triceps Pushdown (v)",                    type:"Pump", rr:[12,15], ts:3},
    {name:"Overhead Cable Triceps Extension", type:"Pump", rr:[12,15], ts:3},
    {name:"Cable Crunch",                     type:"Pump", rr:[15,20], ts:3},
  ],
  Pull:[
    {name:"Neutral Grip Pulldown", type:"Hard", rr:[8,12],  ts:4},
    {name:"Chest-Supported Row",   type:"Hard", rr:[10,12], ts:4},
    {name:"Seated Cable Row",      type:"Hard", rr:[10,12], ts:3},
    {name:"Face Pull",             type:"Pump", rr:[15,20], ts:3},
    {name:"EZ-Bar Curl",           type:"Hard", rr:[10,12], ts:3},
    {name:"Incline DB Curl",       type:"Pump", rr:[10,12], ts:3},
    {name:"Reverse EZ Curl",       type:"Pump", rr:[12,15], ts:3},
    {name:"Hanging Leg Raise",     type:"Pump", rr:[15,20], ts:3},
  ],
  Legs:[
    {name:"Leg Press",           type:"Hard", rr:[10,15], ts:4},
    {name:"Squat/Lunge Machine", type:"Hard", rr:[10,15], ts:4},
    {name:"Seated Leg Curl",     type:"Hard", rr:[10,15], ts:3},
    {name:"Glute Machine",       type:"Pump", rr:[12,15], ts:3},
    {name:"Standing Calf Raise", type:"Pump", rr:[15,20], ts:4},
    {name:"Ab Wheel",            type:"Pump", rr:[10,15], ts:3},
    {name:"Cable Crunch",        type:"Pump", rr:[15,20], ts:3},
  ],
  Aesthetic:[
    {name:"Low-to-High Cable Fly",       type:"Pump", rr:[12,15], ts:4},
    {name:"Cable Fly (Midline squeez)",  type:"Pump", rr:[12,15], ts:3},
    {name:"Cable Lateral Raise",         type:"Pump", rr:[15,20], ts:3},
    {name:"Rear Delt Cable",             type:"Pump", rr:[15,20], ts:3},
    {name:"Rope Curl",                   type:"Pump", rr:[12,15], ts:3},
    {name:"Incline DB Curl",             type:"Pump", rr:[10,12], ts:3},
    {name:"Ab Wheel",                    type:"Pump", rr:[10,15], ts:3},
    {name:"Hanging Leg Raise",           type:"Pump", rr:[15,20], ts:3},
  ],
  Pump:[
    {name:"Leg Press",                type:"Pump",  rr:[15,20], ts:3, note:"Light — 60% of Legs day"},
    {name:"Glute Machine",            type:"Pump",  rr:[15,20], ts:3},
    {name:"Flat Barbell Chest Press", type:"Pump",  rr:[12,15], ts:3, note:"Light — pump focus"},
    {name:"Wide Grip Lat Pulldown",   type:"Maint", rr:[12,15], ts:3, note:"Maintenance only"},
    {name:"EZ-Bar Curl",              type:"Pump",  rr:[12,15], ts:3},
    {name:"Rope Curl",                type:"Pump",  rr:[12,15], ts:3},
    {name:"Rope Pushdown",            type:"Pump",  rr:[12,15], ts:3},
    {name:"Cable Crunch",             type:"Pump",  rr:[15,20], ts:3},
  ],
  Cardio:[
    {name:"Bike / Row", type:"Pump", rr:[20,30], ts:1, unit:"min"},
  ],
};

function hintToday(rpe,r,rr){
  if(!rpe) return null;
  if(rpe<=6) return {text:"+2.5kg today — last session was too easy", cls:"hint-green-box", col:"var(--green)"};
  if(rpe===7) return {text:"+2.5kg today", cls:"hint-green-box", col:"var(--green)"};
  if(rpe===8) return r<rr[1]
    ? {text:`Add ${Math.min(2,rr[1]-r)} more reps today before going heavier`, cls:"hint-blue-box", col:"var(--blue)"}
    : {text:"+2.5kg today — you hit the ceiling last time", cls:"hint-green-box", col:"var(--green)"};
  if(rpe===9) return {text:"Same weight and reps as last session", cls:"hint-amber-box", col:"var(--amber)"};
  return {text:"Drop 5–10% from last session", cls:"hint-red-box", col:"var(--red)"};
}
function hintNext(rpe,r,rr){
  if(!rpe) return null;
  if(rpe<=6) return {text:"+2.5kg next session", col:"var(--green)"};
  if(rpe===7) return {text:"+2.5kg next session", col:"var(--green)"};
  if(rpe===8) return r<rr[1]
    ? {text:`Add ${Math.min(2,rr[1]-r)} reps next session`, col:"var(--blue)"}
    : {text:"+2.5kg next session", col:"var(--green)"};
  if(rpe===9) return {text:"Same weight and reps next session", col:"var(--amber)"};
  return {text:"Deload next session — drop 5–10%", col:"var(--red)"};
}
function rpeCol(rpe){ return rpe<=7?"var(--green)":rpe===8?"var(--blue)":rpe===9?"var(--amber)":"var(--red)"; }
function rpeClass(rpe){ return rpe<=7?"rpe-green":rpe===8?"rpe-blue":rpe===9?"rpe-amber":"rpe-red"; }

const skey = (day, n) => "lgt_" + day + "_" + n.replace(/[^a-zA-Z0-9]/g,"_");
function loadEx(day, name){ try{ const v=localStorage.getItem(skey(day, name)); return v?JSON.parse(v):null; }catch{return null;} }
function saveEx(day, name,data){ try{ localStorage.setItem(skey(day, name),JSON.stringify(data)); }catch{} }

let state = { day:null, sleep:"", sets:{}, openEx:null, draft:{w:20,r:0,rpe:null}, hist:{} };

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen-"+id).classList.add("active");
  window.scrollTo(0,0);
}

function goHome(){ showScreen("home"); }

// Init home
document.getElementById("home-date").textContent = new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
document.getElementById("sleep-input").addEventListener("input", e=>{
  state.sleep = e.target.value;
  document.getElementById("sleep-warn").style.display = parseFloat(e.target.value)<7 ? "block":"none";
});

// Day buttons
const dl = document.getElementById("day-list");
DAYS.forEach(d=>{
  const btn = document.createElement("button");
  btn.className = "day-btn";
  btn.innerHTML = `<div class="day-icon">${d.icon}</div><div class="day-info"><div class="day-name">${d.id}</div><div class="day-muscles">${d.muscles}</div></div><div class="chevron">›</div>`;
  btn.onclick = ()=> pickDay(d.id);
  dl.appendChild(btn);
});

async function pickDay(dayId){
  state.day = dayId;
  state.sets = {};
  state.openEx = null;
  state.draft = {w:20,r:0,rpe:null};
  state.hist = {};

  const di = DAYS.find(d=>d.id===dayId);
  document.getElementById("session-day-title").textContent = dayId;
  document.getElementById("session-day-sub").textContent = di?.muscles || "";
  document.getElementById("session-badge").style.display = "none";

  const sl = state.sleep;
  const banner = document.getElementById("sleep-banner");
  if(sl){
    banner.style.display = "flex";
    document.getElementById("banner-sleep-val").textContent = sl+"h";
    const msg = document.getElementById("banner-sleep-msg");
    if(parseFloat(sl)<7){ msg.textContent="— moderate today"; msg.style.color="var(--amber)"; }
    else { msg.textContent="— well rested, push it"; msg.style.color="var(--green)"; }
  } else { banner.style.display="none"; }

  document.getElementById("loading-msg").style.display="block";
  showScreen("session");

  const exs = EX[dayId]||[];
  exs.forEach(ex=>{ const d=loadEx(dayId, ex.name); if(d) state.hist[ex.name]=d; });
  document.getElementById("loading-msg").style.display="none";
  renderExList();
}

function renderExList(){
  const exs = EX[state.day]||[];
  const el = document.getElementById("ex-list");
  el.innerHTML="";
  const done = Object.values(state.sets).filter(s=>s.length>0).length;
  const badge = document.getElementById("session-badge");
  if(done>0){ badge.style.display="block"; badge.textContent=`${done}/${exs.length}`; }
  else badge.style.display="none";
  document.getElementById("end-btn-wrap").style.display = done>0?"block":"none";

  exs.forEach(ex=>{
    const exSets = state.sets[ex.name]||[];
    const isOpen = state.openEx===ex.name;
    const h = state.hist[ex.name];
    const lastSet = exSets[exSets.length-1];
    const pct = Math.min(100,Math.round((exSets.length/ex.ts)*100));
    const th = h?hintToday(h.rpe,h.r,ex.rr):null;
    const nh = lastSet?hintNext(lastSet.rpe,lastSet.r,ex.rr):null;
    const typeClass = ex.type==="Hard"?"badge-hard":ex.type==="Maint"?"badge-maint":"badge-pump";

    const card = document.createElement("div");
    card.className="ex-card";

    // Build last session line
    let lastLine="";
    if(h){
      const hint = th?`<span class="hint-inline hint-${th.col.includes("green")?"green":th.col.includes("blue")?"blue":th.col.includes("amber")?"amber":"red"}"> → ${th.text}</span>`:"";
      lastLine = `<div class="ex-last">Last: ${h.w}kg × ${h.r} · RPE ${h.rpe} · ${h.date}${hint}</div>`;
    }

    // Progress bar
    let progBar = "";
    if(exSets.length>0){
      const col = pct>=100?"var(--green)":"var(--blue)";
      progBar = `<div class="prog-bar-wrap"><div class="prog-bar" style="width:${pct}%;background:${col};"></div></div>`;
    }

    let bodyHTML="";
    if(isOpen){
      // Today hint
      let todayHintHTML="";
      if(th && exSets.length===0 && h){
        todayHintHTML=`<div class="hint-box ${th.cls}"><strong>Today:</strong> ${th.text} <span style="opacity:0.7">— last: ${h.w}kg × ${h.r} reps · RPE ${h.rpe} (${h.date})</span></div>`;
      }

      // Sets table
      let setsTable="";
      if(exSets.length>0){
        let rows = exSets.map((s,i)=>{
          const ri = s.r<ex.rr[0]?" ⬇":s.r>ex.rr[1]?" ⬆":"";
          return `<div class="set-row"><span class="set-num">${i+1}</span><span class="set-val">${s.w}kg</span><span class="set-val" style="color:${s.r<ex.rr[0]?"var(--amber)":"var(--text)"};">${s.r}${ri}</span><span class="set-val" style="color:${rpeCol(s.rpe)};">${s.rpe}</span></div>`;
        }).join("");
        setsTable=`<div class="sets-table"><div class="sets-thead"><span>#</span><span>Weight</span><span>Reps</span><span>RPE</span></div>${rows}</div>`;
      }

      // Next hint
      let nextHintHTML="";
      if(nh){
        nextHintHTML=`<div class="hint-box" style="background:transparent;border:0.5px solid var(--border2);color:${nh.col};margin-bottom:14px;"><strong>Next session:</strong> ${nh.text}</div>`;
      }

      // Form
      let formHTML="";
      if(exSets.length < ex.ts+2){
        const d = state.draft;
        const rCol2 = d.r>0&&d.r<ex.rr[0]?"var(--amber)":d.r>ex.rr[1]?"var(--red)":"var(--text)";
        const rpeButtons = [6,7,8,9,10].map(r=>{
          const active = d.rpe===r;
          const cls = active?rpeClass(r):"";
          const lbl = ["","","","","","","Easy","Good","Hard","Heavy","Max"][r];
          return `<button class="rpe-btn ${cls}" onclick="setRPE(${r},'${ex.name}')">${r}<span>${lbl}</span></button>`;
        }).join("");
        const disabled = (!d.rpe||d.r===0)?"disabled":"";
        const wLabel = ex.unit==="min"?"Duration (min)":"Weight (kg)";
        formHTML=`
          <div class="set-num-label">Set ${exSets.length+1}</div>
          <div class="set-label-row">${wLabel}</div>
          <div class="stepper">
            <button class="stepper-btn" onclick="stepW(-2.5,'${ex.name}')">−</button>
            <div class="stepper-val" id="wval-${ex.name.replace(/[^a-zA-Z0-9]/g,'_')}">${d.w}</div>
            <button class="stepper-btn" onclick="stepW(2.5,'${ex.name}')">+</button>
          </div>
          <div class="set-label-row">Reps <span style="font-weight:400;text-transform:none;letter-spacing:0;">(target ${ex.rr[0]}–${ex.rr[1]})</span></div>
          <div class="stepper">
            <button class="stepper-btn" onclick="stepR(-1,'${ex.name}')">−</button>
            <div class="stepper-val" id="rval-${ex.name.replace(/[^a-zA-Z0-9]/g,'_')}" style="color:${rCol2};">${d.r}</div>
            <button class="stepper-btn" onclick="stepR(1,'${ex.name}')">+</button>
          </div>
          <div class="set-label-row">RPE</div>
          <div class="rpe-grid" id="rpegrid-${ex.name.replace(/[^a-zA-Z0-9]/g,'_')}">${rpeButtons}</div>
          <button class="log-btn" id="logbtn-${ex.name.replace(/[^a-zA-Z0-9]/g,'_')}" ${disabled} onclick="logSet('${ex.name}')">Log set ${exSets.length+1}</button>`;
      } else {
        formHTML=`<div class="done-msg">All sets done ✓</div>`;
      }

      bodyHTML=`<div class="ex-body">${todayHintHTML}${setsTable}${nextHintHTML}${formHTML}</div>`;
    }

    const doneIcon = exSets.length>=ex.ts?`<span class="badge badge-done">✓</span>`:"";
    const noteLine = ex.note?`<span style="color:var(--muted);"> · ${ex.note}</span>`:"";

    card.innerHTML=`
      <div class="ex-head" onclick="toggleEx('${ex.name}')">
        <div class="ex-head-info">
          <div class="ex-name-row">
            <span class="ex-name">${ex.name}</span>
            <span class="badge badge-${ex.type.toLowerCase()}">${ex.type}</span>
            ${doneIcon}
          </div>
          <div class="ex-meta">${ex.rr[0]}–${ex.rr[1]} ${ex.unit||"reps"} · ${ex.ts} sets${exSets.length>0?` · <strong>${exSets.length} logged</strong>`:""}${noteLine}</div>
          ${!isOpen?lastLine:""}
          ${progBar}
        </div>
        <div class="ex-chev">${isOpen?"▲":"▼"}</div>
      </div>
      ${bodyHTML}
    `;
    el.appendChild(card);
  });
}

function toggleEx(name){
  if(state.openEx===name){ state.openEx=null; }
  else{
    state.openEx=name;
    const prev = state.sets[name]||[];
    const last = prev[prev.length-1];
    const h = state.hist[name];
    state.draft={ w: last?.w??h?.w??20, r: last?.r??h?.r??0, rpe:null };
  }
  renderExList();
}

function stepW(delta, name){
  state.draft.w = Math.max(0, parseFloat((state.draft.w+delta).toFixed(1)));
  const el = document.getElementById("wval-"+name.replace(/[^a-zA-Z0-9]/g,"_"));
  if(el) el.textContent = state.draft.w;
}
function stepR(delta, name){
  state.draft.r = Math.max(0, state.draft.r+delta);
  const ex = (EX[state.day]||[]).find(e=>e.name===name);
  const el = document.getElementById("rval-"+name.replace(/[^a-zA-Z0-9]/g,"_"));
  if(el){
    el.textContent = state.draft.r;
    el.style.color = ex&&state.draft.r>0&&state.draft.r<ex.rr[0]?"var(--amber)":ex&&state.draft.r>ex.rr[1]?"var(--red)":"var(--text)";
  }
}
function setRPE(rpe, name){
  state.draft.rpe = rpe;
  const key = name.replace(/[^a-zA-Z0-9]/g,"_");
  const grid = document.getElementById("rpegrid-"+key);
  if(grid) grid.querySelectorAll(".rpe-btn").forEach((btn,i)=>{
    const r=[6,7,8,9,10][i];
    btn.className="rpe-btn "+(state.draft.rpe===r?rpeClass(r):"");
  });
  const logBtn = document.getElementById("logbtn-"+key);
  if(logBtn) logBtn.disabled = (!state.draft.rpe||state.draft.r===0);
}

function logSet(name){
  if(!state.draft.rpe||state.draft.r===0) return;
  const ex=(EX[state.day]||[]).find(e=>e.name===name);
  if(!ex) return;
  const set={...state.draft};
  if(!state.sets[name]) state.sets[name]=[];
  state.sets[name].push(set);
  saveEx(state.day, name,{w:set.w,r:set.r,rpe:set.rpe,date:new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short"})});
  state.draft={w:set.w,r:set.r,rpe:null};
  renderExList();
}

function goSummary(){
  const exs = EX[state.day]||[];
  const done = Object.entries(state.sets).filter(([,s])=>s.length>0);
  const vol = done.reduce((t,[,s])=>t+s.reduce((a,x)=>a+x.w*x.r,0),0);
  const allSets = done.reduce((t,[,s])=>t+s.length,0);
  const rpes = done.flatMap(([,s])=>s.map(x=>x.rpe));
  const avg = rpes.length?(rpes.reduce((a,b)=>a+b,0)/rpes.length).toFixed(1):"—";
  const di=DAYS.find(d=>d.id===state.day);
  document.getElementById("summary-sub").textContent=`${state.day} · ${new Date().toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"})}`;
  document.getElementById("stats-grid").innerHTML=`
    <div class="stat-card"><div class="stat-label">Total volume</div><div class="stat-val">${Math.round(vol).toLocaleString()}<span class="stat-unit"> kg</span></div></div>
    <div class="stat-card"><div class="stat-label">Sets logged</div><div class="stat-val">${allSets}</div></div>
    <div class="stat-card"><div class="stat-label">Avg RPE</div><div class="stat-val">${avg}</div></div>
    <div class="stat-card"><div class="stat-label">Sleep</div><div class="stat-val">${state.sleep?state.sleep+"<span class='stat-unit'>h</span>":"—"}</div></div>
  `;
  const nc = document.getElementById("next-cards");
  nc.innerHTML="";
  done.forEach(([name,s])=>{
    const ex=exs.find(e=>e.name===name);
    const last=s[s.length-1];
    const nh=ex&&last?hintNext(last.rpe,last.r,ex.rr):null;
    const v=s.reduce((a,x)=>a+x.w*x.r,0);
    nc.innerHTML+=`<div class="next-card"><div class="next-name">${name}</div><div class="next-detail">${s.length} sets · ${Math.round(v)}kg total · last: ${last?.w}kg × ${last?.r} reps · RPE ${last?.rpe}</div>${nh?`<div class="next-hint" style="color:${nh.col};">→ ${nh.text}</div>`:""}</div>`;
  });
  showScreen("summary");
}

function newSession(){
  state={day:null,sleep:state.sleep,sets:{},openEx:null,draft:{w:20,r:0,rpe:null},hist:{}};
  document.getElementById("sleep-input").value="";
  state.sleep="";
  document.getElementById("sleep-warn").style.display="none";
  showScreen("home");
}
</script>
</body>
</html>
